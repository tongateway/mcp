startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      AGENT_GATEWAY_API_URL:
        type: string
        default: "https://api.tongateway.ai"
        description: "Agent Gateway API URL"
    required: []
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@tongateway/mcp'],
      env: {
        AGENT_GATEWAY_API_URL: config.AGENT_GATEWAY_API_URL || 'https://api.tongateway.ai'
      }
    })
